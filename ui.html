<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex Relay — admin</title>
<style>
:root {
  --bg:#08080c; --panel:#101017; --panel2:#16161f; --panel3:#1c1c27; --line:#2a2a37;
  --line2:#373748; --fg:#ececf4; --dim:#8a8aa0; --acc:#8a7bff; --ac2:#6b5bff;
  --green:#2ec47a; --red:#f0596b; --amber:#f5a623; --blue:#54a8ff;
  --mono:ui-monospace,SFMono-Regular,Consolas,monospace; --r:14px; --rs:9px;
}
* { box-sizing:border-box; }
body {
  margin:0; color:var(--fg); font:14px/1.55 system-ui,Segoe UI,Roboto,sans-serif;
  background:radial-gradient(1100px 500px at 12% -8%, rgba(138,123,255,.10), transparent 60%),
             radial-gradient(900px 500px at 100% 0%, rgba(84,168,255,.06), transparent 55%), var(--bg);
}
header {
  position:sticky; top:0; z-index:5; background:rgba(13,13,19,.82); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line); padding:10px 28px 0;
}
.head { display:flex; align-items:center; gap:14px; padding-bottom:10px; }
header h1 { font-size:16px; font-weight:650; margin:0; display:flex; align-items:center; gap:9px; }
header h1::before { content:""; width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 0 4px rgba(138,123,255,.18); }
.grow { flex:1; }
.pill { font:11px/1 var(--mono); padding:5px 11px; border-radius:999px; border:1px solid var(--line); color:var(--dim); }
.pill.up { color:var(--green); border-color:rgba(46,196,122,.4); background:rgba(46,196,122,.1); }
.pill.down { color:var(--red); border-color:rgba(240,89,107,.4); background:rgba(240,89,107,.1); }
.tabs { display:flex; gap:4px; }
.tab {
  background:transparent; color:var(--dim); border:1px solid transparent; border-bottom:2px solid transparent;
  border-radius:8px 8px 0 0; padding:10px 18px; font:12px/1 var(--mono); cursor:pointer; text-transform:uppercase;
  letter-spacing:.5px; transition:color .15s,border-color .15s;
}
.tab:hover { color:var(--fg); } .tab.active { color:var(--acc); border-bottom-color:var(--acc); }
main { max-width:1100px; margin:0 auto; padding:24px 24px 96px; }
.card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); margin:0 0 20px; overflow:hidden; }
.card>h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin:0; padding:14px 22px; font-weight:600; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--panel2),var(--panel)); }
.card>.bd { padding:20px 22px; }
table { width:100%; border-collapse:collapse; font:12px/1.5 var(--mono); }
th,td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
th { color:var(--dim); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; background:var(--panel2); }
tr:hover td { background:var(--panel2); } tr:last-child td { border-bottom:none; }
td.n { text-align:right; }
td.ok { color:var(--green); font-weight:600; } td.err { color:var(--red); } td.fb { color:var(--amber); font-weight:600; }
label { display:block; color:var(--dim); font-size:10.5px; margin:0 0 6px; text-transform:uppercase; letter-spacing:.6px; }
input,select,textarea {
  width:100%; background:var(--panel2); color:var(--fg); border:1px solid var(--line); border-radius:var(--rs); padding:9px 11px; font:13px var(--mono);
}
input:focus,select:focus { outline:none; border-color:var(--acc); box-shadow:0 0 0 3px rgba(138,123,255,.22); }
.btn {
  background:var(--panel3); color:var(--fg); border:1px solid var(--line); border-radius:var(--rs); padding:9px 15px; font:13px var(--mono); cursor:pointer;
}
.btn:hover { border-color:var(--acc); } .btn.primary { background:linear-gradient(180deg,var(--acc),var(--ac2)); border-color:var(--ac2); color:#fff; font-weight:600; }
.btn.danger { color:var(--red); } .btn.sm { padding:5px 11px; font-size:12px; }
.routerow { display:grid; grid-template-columns:110px 1fr 1fr 100px; gap:10px; align-items:center; margin-bottom:10px; padding:10px; border:1px solid transparent; border-radius:var(--rs); }
.routerow:hover { background:var(--panel2); border-color:var(--line); }
.routerow .k { font:12px var(--mono); color:var(--acc); font-weight:600; }
.routerow .k.sub { color:var(--dim); font-weight:400; font-size:11px; }
.fbrow { margin-top:-8px; margin-bottom:12px; padding-left:120px; }
.fbrow:hover { background:transparent; border-color:transparent; }
.secretrow { display:grid; grid-template-columns:150px 1fr 80px; gap:10px; align-items:center; margin-bottom:8px; }
.secretrow .name { font:12px var(--mono); font-weight:600; color:var(--fg); }
.secretrow .status { font:11px var(--mono); color:var(--dim); }
.secretrow .status.set { color:var(--green); }
.provrow { display:grid; grid-template-columns:130px 1fr 100px 140px; gap:10px; align-items:center; margin-bottom:8px; padding:6px 8px; border:1px solid transparent; border-radius:var(--rs); }
.provrow:hover { background:var(--panel2); border-color:var(--line); }
.provname { font:12px var(--mono); font-weight:600; color:var(--fg); }
.msg { font:12px var(--mono); min-height:1em; padding:6px 0; }
.msg.ok { color:var(--green); } .msg.err { color:var(--red); }
.savebar { position:sticky; bottom:0; z-index:5; background:rgba(13,13,19,.9); backdrop-filter:blur(12px); border-top:1px solid var(--line); padding:13px 28px; display:flex; gap:14px; align-items:center; }
h2 { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:1.2px; margin:24px 0 10px; padding-left:22px; }
.hint { color:var(--dim); font-size:11px; margin-top:8px; }
</style>
</head>
<body>
<header>
  <div class="head"><h1>codex-relay</h1><span id="statusPill" class="pill down">DOWN</span><span class="grow"></span><span id="uptime" class="pill" style="margin-right:8px"></span></div>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="routes">Routes</button>
    <button class="tab" data-tab="providers">Providers</button>
    <button class="tab" data-tab="secrets">Secrets</button>
  </div>
</header>
<main>
  <div id="tab-dashboard">
    <div class="card"><h3>Daemon</h3><div class="bd">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><label>PID</label><span id="dPid" style="font:13px var(--mono)">—</span></div>
        <div><label>Port</label><span id="dPort" style="font:13px var(--mono)">—</span></div>
        <div><label>Uptime</label><span id="dUptime" style="font:13px var(--mono)">—</span></div>
        <div><label>Config Hash</label><span id="dHash" style="font:13px var(--mono)">—</span></div>
        <div><label>Fallback</label><span id="dFallback" style="font:13px var(--mono)">—</span></div>
        <div><label>Quota Pressure</label><span id="dQuota" style="font:13px var(--mono)">—</span></div>
      </div>
    </div></div>
    <h2>Route Status</h2>
    <div class="card"><table><thead><tr><th>Route</th><th>Target</th><th>Fallback</th><th>Last</th><th>Req</th><th>Err</th><th>Fb</th></tr></thead><tbody id="routeTable"></tbody></table></div>
  </div>
  <div id="tab-routes" style="display:none"></div>
  <div id="tab-providers" style="display:none"></div>
  <div id="tab-secrets" style="display:none"></div>
</main>
<div class="savebar" id="saveBar" style="display:none"><span class="grow"></span><span class="msg" id="saveMsg"></span><button class="btn primary" id="saveBtn">Save</button></div>
<script>
const $ = (s) => document.querySelector(s); const $$ = (s) => document.querySelectorAll(s);
let config = null, secrets = {}, dirtyConfig = null, dirtySecrets = null;
async function api(url, opts) { const r = await fetch(url, opts); return r.json(); }
async function loadHealth() { const h = await api("/__relay/health");
  $ ("#statusPill").className = "pill " + (h.status==="ok"?"up":"down"); $("#statusPill").textContent = h.status==="ok"?"UP":"DOWN";
  if (h.status==="ok") {
    $("#dPid").textContent = h.pid; $("#dPort").textContent = h.host+":"+h.port; $("#dUptime").textContent = h.uptimeSec+"s";
    $("#dHash").textContent = h.configHash; $("#dFallback").textContent = h.fallbackEnabled ? "ON" : "OFF";
    $("#dQuota").textContent = h.quota ? (h.quota.pressure*100).toFixed(1)+"%" : "—";
    $("#uptime").textContent = "uptime "+h.uptimeSec+"s";
    const tb = $("#routeTable"); tb.innerHTML = "";
    for (const k of ["default","background","think","longContext","webSearch","image"]) {
      const r = h.routes[k]||{}; const lr = r.lastResult||"unknown";
      tb.innerHTML += `<tr><td style="font-weight:600;color:var(--acc)">${k}</td><td>${r.target||"—"}</td><td>${r.fallback||"—"}</td><td class="${lr==="ok"?"ok":lr.startsWith("fallback")?"fb":"err"}">${lr}</td><td class="n">${r.requests||0}</td><td class="n">${r.errors||0}</td><td class="n">${r.fallbacks||0}</td></tr>`;
    }
  }
}
async function loadConfig() {
  const r = await api("/__relay/config"); if (!r.config) return;
  config = r.config; dirtyConfig = null;
  renderRoutes(); renderProviders();
}
function renderRoutes() {
  if (!config) return;
  let h = `<div class="card"><h3>Routes</h3><div class="bd" id="routeEditor">`;
  for (const k of ["default","background","think","longContext","webSearch","image"]) {
    const r = config.routes[k]||{}; const t = r.target||""; const fb = r.fallback||"off"; const ft = r.fallbackTarget||"";
    const [prov="",model=""] = t.includes(",")?t.split(","):["",""];
    const [fp="",fm=""] = ft.includes(",")?ft.split(","):["",""];
    h += `<div class="routerow"><span class="k">${k}</span><select data-route="${k}" data-field="provider">${provOpts(prov)}</select><select data-route="${k}" data-field="model">${modelOpts(k,model)}</select><span></span></div>`;
    h += `<div class="routerow fbrow"><span class="k sub">fallback</span><select data-route="${k}" data-field="fb" style="max-width:100px"><option value="off" ${fb==="off"?"selected":""}>off</option><option value="chain" ${fb==="chain"?"selected":""}>chain</option></select><input data-route="${k}" data-field="fbTarget" value="${ft}" placeholder="provider,model" style="${fb!=="chain"?"display:none":""}" ${fb!=="chain"?"disabled":""}><span></span></div>`;
  }
  h += `<div class="hint">Routes are evaluated top-to-bottom: image → longContext → webSearch → think → background → default</div></div></div>`;
  $("#tab-routes").innerHTML = h;
  $$("select[data-field=provider]").forEach(s => s.onchange = () => routeChanged(s));
  $$("select[data-field=fb]").forEach(s => s.onchange = () => routeChanged(s));
  $$("input[data-field=fbTarget]").forEach(i => i.oninput = () => markDirty());
}
function provOpts(sel) {
  let o = "";
  for (const p of Object.keys(config.providers||{})) { o += `<option value="${p}" ${p===sel?"selected":""}>${p}</option>`; }
  return o;
}
function modelOpts(rk, sel) {
  let o = "";
  const row = document.querySelector(`select[data-route="${rk}"][data-field=provider]`);
  const prov = row ? row.value : "";
  const models = config.providers&&config.providers[prov]?config.providers[prov].models:[] || [];
  for (const m of models) { o += `<option value="${m}" ${m===sel?"selected":""}>${m}</option>`; }
  return o;
}
function routeChanged(el) {
  const rk = el.dataset.route;
  if (el.dataset.field === "fb") {
    const fb = el.value; const inp = document.querySelector(`input[data-route="${rk}"][data-field=fbTarget]`);
    if (fb === "chain") { inp.style.display = ""; inp.disabled = false; } else { inp.style.display = "none"; inp.disabled = true; }
  }
  if (el.dataset.field === "provider") {
    const sel = document.querySelector(`select[data-route="${rk}"][data-field=model]`);
    sel.innerHTML = modelOpts(rk, sel.value);
  }
  markDirty();
}
function markDirty() { if (!dirtyConfig) { dirtyConfig = JSON.parse(JSON.stringify(config)); } $("#saveBar").style.display = "flex"; $("#saveMsg").textContent = "Unsaved changes"; }
async function saveConfig() {
  const nc = dirtyConfig || config; if (!nc) return;
  for (const k of ["default","background","think","longContext","webSearch","image"]) {
    const p = document.querySelector(`select[data-route="${k}"][data-field=provider]`);
    const m = document.querySelector(`select[data-route="${k}"][data-field=model]`);
    const fb = document.querySelector(`select[data-route="${k}"][data-field=fb]`);
    const ft = document.querySelector(`input[data-route="${k}"][data-field=fbTarget]`);
    if (p&&m) nc.routes[k].target = `${p.value},${m.value}`;
    if (fb) { nc.routes[k].fallback = fb.value; if (ft) nc.routes[k].fallbackTarget = ft.value; }
  }
  const r = await api("/__relay/config", { method:"PUT", body:JSON.stringify(nc) });
  if (r.ok) { config = nc; dirtyConfig = null; $("#saveBar").style.display = "none"; $("#saveMsg").textContent = ""; $("#saveMsg").className = "msg ok"; $("#saveMsg").textContent = "Saved. Daemon hot-reloaded."; setTimeout(()=>$("#saveMsg").textContent="",3000); }
  else { $("#saveMsg").className = "msg err"; $("#saveMsg").textContent = "Error: "+(r.errors||[]).join(", "); }
}
function renderProviders() {
  if (!config) return;
  let h = `<div class="card"><h3>Providers</h3><div class="bd">`;
  for (const [name,p] of Object.entries(config.providers||{})) {
    h += `<div class="provrow"><span class="provname">${name}</span><span style="font:11px var(--mono);color:var(--dim)">${p.baseUrl||"—"}</span><span style="font:11px var(--mono);color:var(--dim)">profile: ${p.profile||"—"}</span><span style="font:11px var(--mono);color:var(--dim)">${(p.models||[]).length} models</span></div>`;
  }
  h += `</div></div>`;
  $("#tab-providers").innerHTML = h;
}
async function loadSecrets() {
  const r = await api("/__relay/secrets"); secrets = r.secrets||{}; renderSecrets();
}
function renderSecrets() {
  const names = Object.keys(secrets).sort();
  let h = `<div class="card"><h3>API Keys</h3><div class="bd">`;
  for (const n of names) {
    h += `<div class="secretrow"><span class="name">${n}</span><span class="status ${secrets[n]?"set":""}">${secrets[n]?"✔ set":"✗ empty"}</span><input data-secret="${n}" placeholder="sk-..." type="password"></div>`;
  }
  h += `<div style="margin-top:12px"><label>New key name</label><div style="display:flex;gap:8px"><input id="newKeyName" placeholder="provider-name" style="flex:1"><input id="newKeyValue" placeholder="sk-..." type="password" style="flex:2"><button class="btn sm" onclick="addSecret()">Add</button></div></div>`;
  h += `</div></div>`;
  $("#tab-secrets").innerHTML = h;
  $$("input[data-secret]").forEach(i => i.oninput = () => markSecretsDirty());
}
let secretsTimer = null;
function markSecretsDirty() { clearTimeout(secretsTimer); secretsTimer = setTimeout(saveSecrets, 1200); }
async function saveSecrets() {
  const payload = {};
  $$("input[data-secret]").forEach(i => { if (i.value.trim()) payload[i.dataset.secret] = i.value.trim(); });
  await api("/__relay/secrets", { method:"PUT", body:JSON.stringify(payload) });
  loadSecrets();
}
async function addSecret() {
  const n = $("#newKeyName").value.trim(); const v = $("#newKeyValue").value.trim();
  if (!n||!v) return;
  await api("/__relay/secrets", { method:"PUT", body:JSON.stringify({ [n]: v }) });
  $("#newKeyName").value = ""; $("#newKeyValue").value = "";
  loadSecrets();
}
// Tabs
$$(".tab").forEach(t => t.onclick = () => {
  $$(".tab").forEach(x => x.classList.remove("active")); t.classList.add("active");
  const tab = t.dataset.tab;
  $$("[id^=tab-]").forEach(x => x.style.display = x.id === "tab-"+tab ? "" : "none");
  if (tab === "routes") loadConfig(); if (tab === "providers") loadConfig(); if (tab === "secrets") loadSecrets();
});
$("#saveBtn").onclick = saveConfig;
loadHealth(); setInterval(loadHealth, 5000);
</script>
</body>
</html>
